services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--config", "/config.yaml"]
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/config.yaml:ro
    environment:
      # Slack tokens (required)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      # Agent API keys (passed through to ACP agent subprocesses via config env block)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    # Note: distroless has no shell/wget/curl, so Docker HEALTHCHECK cannot
    # probe the container directly. Use Docker Compose depends_on with
    # service_healthy condition by adding a sidecar, or rely on orchestrator
    # probes (e.g. Kubernetes livenessProbe hitting :8080/health/live).
    restart: unless-stopped